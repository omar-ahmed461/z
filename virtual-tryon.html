<!DOCTYPE html>
<html>
<head>
  <title>Virtual Try-On</title>
  <style>
    body {
      margin: 0;
      display: flex;
      font-family: Arial;
      background: #F8F4EF;
    }

    #canvas {
      flex: 7;
    }

    #panel {
      flex: 3;
      background: white;
      padding: 20px;
      box-shadow: -5px 0 20px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div id="canvas"></div>

<div id="panel">
  <h2>Za3tar Try-On</h2>

  <p>Height (cm)</p>
  <input type="number" id="height" value="170">

  <p>Weight (kg)</p>
  <input type="number" id="weight" value="70">

  <p>Chest</p>
  <input type="number" id="chest" value="90">

  <p>Waist</p>
  <input type="number" id="waist" value="70">

  <p>Hips</p>
  <input type="number" id="hips" value="95">
</div>

<script type="module" src="./js/tryon.js"></script>

</body>
</html>
